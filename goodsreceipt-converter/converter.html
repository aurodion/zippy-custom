<div class="card mt-4 mb-3 border">
    <div class="card-body p-3">

        <div class="form-group mb-3 p-2 text-center border rounded">
            <div class="custom-control custom-radio custom-control-inline">
                <input type="radio" id="mode_val" name="conv_mode" class="custom-control-input" value="val" checked>
                <label class="custom-control-label" for="mode_val" style="font-size: 0.85rem; font-weight: bold; cursor: pointer;">валюта</label>
            </div>
            <div class="custom-control custom-radio custom-control-inline">
                <input type="radio" id="mode_uah" name="conv_mode" class="custom-control-input" value="uah">
                <label class="custom-control-label" for="mode_uah" style="font-size: 0.85rem; font-weight: bold; cursor: pointer;">гривня</label>
            </div>
        </div>

        <div class="form-group mb-3">
            <label id="lbl_main_input" style="font-weight: bold; font-size: 0.8rem; margin-bottom: 3px; display: block; color: #6c757d;">Ціна у валюті:</label>
            <input type="text" id="conv_usd" class="form-control" style="font-weight: bold; font-size: 1.1rem; height: 38px;" value="" placeholder="Введіть суму..." onfocus="this.select();" onmouseup="return false;">
        </div>

        <div class="p-2 mb-3 border rounded bg-light">

            <div id="row_pure" class="d-flex justify-content-between align-items-center mb-2 pb-2 border-bottom">
                <span style="font-weight: bold; font-size: 0.9rem;">
                    UAH (чиста): <span id="res_pure" class="text-dark">0.00</span>
                </span>
                <button type="button" class="btn btn-primary btn-sm px-2 py-0" style="font-size: 0.75rem; height: 22px;" onclick="copyToClipboard('res_pure')">Копіювати</button>
            </div>

            <div class="d-flex justify-content-between align-items-center">
                <span style="font-weight: bold; font-size: 0.9rem; color: #6c757d;">
                    UAH × <span id="lbl_margin">1.6</span>: <span id="res_margin" class="text-dark">0.00</span>
                </span>
                <button type="button" class="btn btn-primary btn-sm px-2 py-0" style="font-size: 0.75rem; height: 22px;" onclick="copyToClipboard('res_margin')">Копіювати</button>
            </div>

        </div>

        <div class="form-group mb-2" id="group_rate">
            <label style="font-weight: bold; font-size: 0.8rem; margin-bottom: 3px; display: block; color: #6c757d;">Курс валюти:</label>
            <input type="text" id="conv_rate" class="form-control" style="height: 34px;" value="45.5" onfocus="this.select();" onmouseup="return false;">  <!-- Курс валюти за замовчуванням -->
        </div>

        <div class="form-group mb-1">                                                             
            <label style="font-weight: bold; font-size: 0.8rem; margin-bottom: 3px; display: block; color: #6c757d;">Коефіцієнт націнки:</label>
            <input type="text" id="conv_margin" class="form-control" style="height: 34px;" value="1.6" onfocus="this.select();" onmouseup="return false;"><!-- Коефіцієнт націнки за замовчуванням -->
        </div>

    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const usdInput    = document.getElementById('conv_usd');
    const rateInput   = document.getElementById('conv_rate');
    const marginInput = document.getElementById('conv_margin');

    const resPure    = document.getElementById('res_pure');
    const resMargin  = document.getElementById('res_margin');
    const lblMargin  = document.getElementById('lbl_margin');

    const lblMainInput = document.getElementById('lbl_main_input');
    const rowPure      = document.getElementById('row_pure');
    const groupRate    = document.getElementById('group_rate');

    const savedRate   = sessionStorage.getItem('conv_saved_rate');
    const savedMargin = sessionStorage.getItem('conv_saved_margin');
    const savedMode   = sessionStorage.getItem('conv_saved_mode');

    if (savedRate   !== null) rateInput.value  = savedRate;
    if (savedMargin !== null) marginInput.value = savedMargin;
    if (savedMode   !== null) {
        document.querySelectorAll('input[name="conv_mode"]').forEach(r => {
            if (r.value === savedMode) r.checked = true;
        });
    }

    function parseValue(val) {
        return parseFloat(val.replace(',', '.').replace(/[^0-9.]/g, '')) || 0;
    }

    function calculate() {
        const activeMode = document.querySelector('input[name="conv_mode"]:checked').value;
        const inputVal   = parseValue(usdInput.value);
        const rate       = parseValue(rateInput.value);
        const marginCoef = parseValue(marginInput.value);

        lblMargin.innerText = marginInput.value.replace(',', '.');

        if (activeMode === 'val') {
            lblMainInput.innerText = "Ціна у валюті:";
            rowPure.style.setProperty('display', 'flex', 'important');
            groupRate.style.display = 'block';

            const pure   = inputVal * rate;
            const margin = pure * marginCoef;

            resPure.innerText   = pure.toFixed(2);
            resMargin.innerText = margin.toFixed(2);
        } else {
            lblMainInput.innerText = "Ціна в грн (вхідна):";
            rowPure.style.setProperty('display', 'none', 'important');
            groupRate.style.display = 'none';

            resMargin.innerText = (inputVal * marginCoef).toFixed(2);
        }

        sessionStorage.setItem('conv_saved_rate',   rateInput.value);
        sessionStorage.setItem('conv_saved_margin',  marginInput.value);
        sessionStorage.setItem('conv_saved_mode',    activeMode);
    }

    document.querySelectorAll('input[name="conv_mode"]').forEach(r => {
        r.addEventListener('change', function() {
            usdInput.value = '';
            calculate();
            usdInput.focus();
        });
    });

    usdInput.addEventListener('input',    calculate);
    rateInput.addEventListener('input',   calculate);
    marginInput.addEventListener('input', calculate);

    calculate();
});

function copyToClipboard(elementId) {
    const text = document.getElementById(elementId).innerText;
    const tmp  = document.createElement('textarea');
    tmp.value  = text;
    document.body.appendChild(tmp);
    tmp.select();
    document.execCommand('copy');
    document.body.removeChild(tmp);

    const btn     = event.target;
    const oldText = btn.innerText;
    btn.innerText = '✓ Скопійовано';
    btn.classList.replace('btn-primary', 'btn-success');

    setTimeout(() => {
        btn.innerText = oldText;
        btn.classList.replace('btn-success', 'btn-primary');
    }, 1000);
}
</script>
